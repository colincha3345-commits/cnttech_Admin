name: Docs → Google Drive 동기화

on:
  push:
    paths:
      - 'docs/**/*.md'
    branches:
      - main

  workflow_dispatch:

jobs:
  convert-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convert MD to DOCX
        run: |
          mkdir -p docs/docx
          for md_file in docs/spec_*.md docs/implemented_features.md docs/progress.md; do
            if [ -f "$md_file" ]; then
              filename=$(basename "$md_file" .md)
              echo "Converting: $md_file → docs/docx/${filename}.docx"
              pandoc "$md_file" \
                -f markdown \
                -t docx \
                --reference-doc=docs/reference.docx \
                -o "docs/docx/${filename}.docx" \
                2>/dev/null || \
              pandoc "$md_file" \
                -f markdown \
                -t docx \
                -o "docs/docx/${filename}.docx"
            fi
          done
          echo "✅ 변환 완료: $(ls docs/docx/*.docx 2>/dev/null | wc -l)개 파일"

      - name: Setup Google credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          printenv GOOGLE_SERVICE_ACCOUNT_KEY > /tmp/sa-key.json

      - name: Upload to Google Drive
        env:
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          pip install google-api-python-client google-auth --quiet

          python3 << 'PYTHON_SCRIPT'
          import os, json, sys
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          key_path = '/tmp/sa-key.json'
          if not os.path.exists(key_path) or os.path.getsize(key_path) < 10:
              print("⚠️ GOOGLE_SERVICE_ACCOUNT_KEY가 설정되지 않았습니다.")
              sys.exit(0)

          folder_id = os.environ.get('GOOGLE_DRIVE_FOLDER_ID', '')
          if not folder_id:
              print("⚠️ GOOGLE_DRIVE_FOLDER_ID가 설정되지 않았습니다.")
              sys.exit(0)

          creds = service_account.Credentials.from_service_account_file(
              key_path,
              scopes=['https://www.googleapis.com/auth/drive.file']
          )
          service = build('drive', 'v3', credentials=creds)

          docx_dir = 'docs/docx'
          if not os.path.exists(docx_dir):
              print("변환된 파일이 없습니다.")
              sys.exit(0)

          uploaded = 0
          for filename in sorted(os.listdir(docx_dir)):
              if not filename.endswith('.docx'):
                  continue

              filepath = os.path.join(docx_dir, filename)

              query = f"name='{filename}' and '{folder_id}' in parents and trashed=false"
              results = service.files().list(
                  q=query, fields='files(id)',
                  supportsAllDrives=True
              ).execute()
              existing = results.get('files', [])

              media = MediaFileUpload(
                  filepath,
                  mimetype='application/vnd.openxmlformats-officedocument.wordprocessingml.document'
              )

              if existing:
                  file_id = existing[0]['id']
                  service.files().update(
                      fileId=file_id,
                      media_body=media,
                      supportsAllDrives=True
                  ).execute()
                  print(f"📝 업데이트: {filename}")
              else:
                  file_metadata = {
                      'name': filename,
                      'parents': [folder_id],
                  }
                  service.files().create(
                      body=file_metadata,
                      media_body=media,
                      fields='id',
                      supportsAllDrives=True
                  ).execute()
                  print(f"✅ 신규 업로드: {filename}")

              uploaded += 1

          print(f"\n🎉 총 {uploaded}개 파일 동기화 완료")
          PYTHON_SCRIPT

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/sa-key.json

      - name: Upload docx as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs-docx
          path: docs/docx/*.docx
          retention-days: 30
